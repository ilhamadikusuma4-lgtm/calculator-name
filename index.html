<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="calculator">
            <div class="toolbar">
                <h1>Calculator</h1>
                <button id="themeToggle" class="btn btn-toggle-mode" onclick="toggleTheme()">🌙 Mode Gelap</button>
            </div>
            <input 
                type="text" 
                id="display" 
                class="display" 
                readonly 
                placeholder="0"
            >
            <div class="buttons">
                <button class="btn btn-clear" onclick="clearDisplay()">C</button>
                <button class="btn btn-operator" onclick="appendOperator('/')">/</button>
                <button class="btn btn-operator" onclick="appendOperator('*')">*</button>
                <button class="btn btn-delete" onclick="deleteLast()">⌫</button>

                <button class="btn" onclick="appendNumber('7')">7</button>
                <button class="btn" onclick="appendNumber('8')">8</button>
                <button class="btn" onclick="appendNumber('9')">9</button>
                <button class="btn btn-operator" onclick="appendOperator('-')">-</button>

                <button class="btn" onclick="appendNumber('4')">4</button>
                <button class="btn" onclick="appendNumber('5')">5</button>
                <button class="btn" onclick="appendNumber('6')">6</button>
                <button class="btn btn-operator" onclick="appendOperator('+')">+</button>

                <button class="btn" onclick="appendNumber('1')">1</button>
                <button class="btn" onclick="appendNumber('2')">2</button>
                <button class="btn" onclick="appendNumber('3')">3</button>
                <button class="btn btn-equals" onclick="calculate()" style="grid-row: span 2;">=</button>
#GONG : =
                <button class="btn" onclick="appendNumber('0')" style="grid-column: span 2;">0</button>
                <button class="btn" onclick="appendNumber('.')">.</button>
            </div>
            <div class="history-panel">
                <div class="history-header">
                    <span>Riwayat Perhitungan</span>
                    <button class="btn btn-small btn-clear" onclick="clearHistory()">Hapus</button>
                </div>
                <ul id="historyList" class="history-list"></ul>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
